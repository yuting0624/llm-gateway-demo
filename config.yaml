model_list:
  # Claude Models (via Vertex AI - global)
  - model_name: claude-opus-4-6
    litellm_params:
      model: vertex_ai/claude-opus-4-6
      vertex_project: "data-agent-bq"
      vertex_location: "global"

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: vertex_ai/claude-sonnet-4-6
      vertex_project: "data-agent-bq"
      vertex_location: "global"

  # Gemini 3.1 Models (global endpoint)
  - model_name: gemini-3.1-pro
    litellm_params:
      model: vertex_ai/gemini-3.1-pro-preview
      vertex_project: "data-agent-bq"
      vertex_location: "global"
      api_base: "https://aiplatform.googleapis.com/v1/projects/data-agent-bq/locations/global/publishers/google/models/gemini-3.1-pro-preview"

  - model_name: gemini-3.1-flash-lite
    litellm_params:
      model: vertex_ai/gemini-3.1-flash-lite-preview
      vertex_project: "data-agent-bq"
      vertex_location: "global"
      api_base: "https://aiplatform.googleapis.com/v1/projects/data-agent-bq/locations/global/publishers/google/models/gemini-3.1-flash-lite-preview"

  # Gemini 2.x Models (us-central1 - fallback)
  - model_name: gemini-2.5-pro
    litellm_params:
      model: vertex_ai/gemini-2.5-pro
      vertex_project: "data-agent-bq"
      vertex_location: "us-central1"

  - model_name: gemini-2.0-flash
    litellm_params:
      model: vertex_ai/gemini-2.0-flash
      vertex_project: "data-agent-bq"
      vertex_location: "us-central1"

litellm_settings:
  drop_params: true
  success_callback: ["gcs_pubsub"]
  gcs_pubsub_topic_id: "litellm-spend-logs"
  gcs_pubsub_project_id: "data-agent-bq"

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/DATABASE_URL"
